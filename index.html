<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">
    <div class="stars" aria-hidden="true"></div>

    <main class="card">
      <div class="frame">
        <div class="frame__arc" aria-hidden="true"></div>
        <img class="frame__avatar" src="avatar.png" alt="Avatar">
      </div>

      <h1 class="name" id="name"></h1>
      <p class="tagline" id="tagline"></p>

      <div class="whisker" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>

      <nav class="tags" id="tags"></nav>
    </main>

    <p class="footnote">edit <code>links.js</code> to update these</p>
  </div>

<script src="links.js"></script>
<script src="app.js"></script>
</body>
</html>
